/* 输入框：去掉宽度 100% + focus 扩展的左右晃动问题 */
#pagefind-search .pagefind-ui__search-input {
    padding: 10px 16px;
    border: 2px solid #ddd;
    border-radius: 25px;
    font-size: 16px;
    /* 固定宽度，或者使用 min-width + max-width 防止晃动 */
    width: 300px;                     /* 固定一个舒适的宽度 */
    max-width: 100%;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    background: white;
    color: #333;
    box-sizing: border-box;
    outline: none;
}

#pagefind-search .pagefind-ui__search-input:focus {
    border-color: #4a6fa5;
    box-shadow: 0 0 0 4px rgba(74, 111, 165, 0.2);
    /* focus 时不再改变宽度，避免整个搜索框左右晃动 */
}

/* 下拉结果：从右对齐改为居中对齐 */
#pagefind-search .pagefind-ui__results {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    position: absolute;
    top: calc(100% + 8px);            /* 确保与搜索框有间距 */
    left: 50%;                        /* 关键：左边 50% */
    transform: translateX(-50%);      /* 关键：向左偏移自身宽度的一半 → 完全居中 */
    right: auto;                      /* 取消原来的 right: 0 */
    width: 380px;
    max-height: 70vh;                 /* 限制最大高度为视口高度的70%，提供更多搜索结果可见空间 */

    z-index: 1000;
    padding: 8px 0;
    margin-top: 0;
}

    <!-- 终极链接修复解决方案 -->
    <script>
        // 终极链接修复解决方案
        (function() {
            'use strict';
            
            console.log('启动终极链接修复方案...');
            
            // 立即拦截所有链接点击事件
            document.addEventListener('click', function(event) {
                let target = event.target;
                
                // 找到最近的链接元素
                while (target && target.tagName !== 'A') {
                    target = target.parentElement;
                }
                
                if (target && target.tagName === 'A') {
                    const href = target.getAttribute('href');
                    
                    // 检查是否是相对HTML链接且缺少post前缀
                    if (href && href.endsWith('.html') && 
                        !href.startsWith('/') && 
                        !href.startsWith('http') && 
                        !href.includes('post/')) {
                        
                        const newHref = '/post/' + href;
                        console.log('即时修复链接:', href, '->', newHref);
                        
                        // 阻止默认行为
                        event.preventDefault();
                        
                        // 修复链接
                        target.setAttribute('href', newHref);
                        
                        // 立即跳转到修复后的链接
                        window.location.href = newHref;
                    }
                }
            }, true); // 使用捕获阶段
            
            // 监听所有动态生成的链接
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.nodeType === 1) {
                            // 处理新添加的元素
                            processElement(node);
                        }
                    });
                });
            });
            
            function processElement(element) {
                // 如果是链接元素，直接处理
                if (element.tagName === 'A') {
                    fixLink(element);
                }
                
                // 如果包含子元素，递归处理
                if (element.querySelectorAll) {
                    const links = element.querySelectorAll('a[href*=".html"]');
                    links.forEach(fixLink);
                }
            }
            
            function fixLink(link) {
                const href = link.getAttribute('href');
                if (href && href.endsWith('.html') && 
                    !href.startsWith('/') && 
                    !href.startsWith('http') && 
                    !href.includes('post/')) {
                    
                    const newHref = '/post/' + href;
                    console.log('修复动态链接:', href, '->', newHref);
                    link.setAttribute('href', newHref);
                }
            }
            
            // 开始监听DOM变化
            observer.observe(document.body, {
                childList: true,
                subtree: true
            });
            
            // 立即处理现有页面中的所有链接
            function fixExistingLinks() {
                const links = document.querySelectorAll('a[href*=".html"]');
                links.forEach(fixLink);
                console.log(`已处理 ${links.length} 个现有链接`);
            }
            
            // 页面加载完成后修复现有链接
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', fixExistingLinks);
            } else {
                fixExistingLinks();
            }
            
            // 定期检查和修复（备用机制）
            setInterval(fixExistingLinks, 1000);
            
            console.log('终极链接修复方案已激活');
        })();
    </script>
